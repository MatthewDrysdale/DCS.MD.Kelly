name: Deploy to GitHub Pages
on:
  push:
    branches:
      - main
permissions:
  contents: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '9.0.x'
      - name: Restore
        run: dotnet restore
      - name: Publish
        run: dotnet publish DCS.MD.Kelly.Web/DCS.MD.Kelly.Web.csproj -c Release -o publish
      - name: Fix base path
        run: |
          cp publish/wwwroot/index.html publish/wwwroot/404.html
          sed -i 's|<base href=[^>]*>|<base href="/DCS.MD.Kelly/" />|g' publish/wwwroot/index.html
          sed -i 's|<base href=[^>]*>|<base href="/DCS.MD.Kelly/" />|g' publish/wwwroot/404.html
          echo "=== checking base href ==="
          grep base publish/wwwroot/index.html
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: publish/wwwroot